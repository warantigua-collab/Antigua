name: News report
description: Report an event affecting San Cristóbal El Alto (road closure, earthquake damage, or anything else worth sharing with the village and visitors)
title: "[News] "
labels: ["news-submission"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping keep the community and visitors informed. Describe what happened below — the site owner reviews reports before they're posted, so no need to worry about formatting.
  - type: textarea
    id: report
    attributes:
      label: What happened?
      description: What happened, where, and roughly when. If you have a photo, drag and drop it right into this box — GitHub will attach it automatically.
      placeholder: |
        What happened:

        Where:

        When:
    validations:
      required: true
